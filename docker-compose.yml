version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: zar3a-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: zar3a_db
      MYSQL_USER: zar3a_user
      MYSQL_PASSWORD: zar3a_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build:
      context: ./zar3a-backend\ copy
      dockerfile: Dockerfile
    container_name: zar3a-backend
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: zar3a_db
      DB_USER: zar3a_user
      DB_PASS: zar3a_pass
      DATABASE_URL: "mysql://zar3a_user:zar3a_pass@mysql:3306/zar3a_db"
      CLIENT_URL: http://localhost:5173
      JWT_ACCESS_SECRET: your-secret-key-change-me
      JWT_REFRESH_SECRET: your-refresh-secret-change-me
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./zar3a-backend\ copy/uploads:/app/uploads

  # Frontend
  frontend:
    build:
      context: ./Zar3a
      dockerfile: Dockerfile
    container_name: zar3a-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5001
    depends_on:
      - backend

volumes:
  mysql_data:

networks:
  default:
    name: zar3a-network
